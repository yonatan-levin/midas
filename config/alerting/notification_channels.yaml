# DCF Valuation API - Notification Channels Configuration
# This file defines notification channels for alert delivery

notification_channels:
  # Email Channels
  - id: "email-ops"
    name: "Operations Team Email"
    type: "email"
    enabled: true
    config:
      smtp_server: "${SMTP_SERVER:-smtp.company.com}"
      smtp_port: 587
      from_email: "dcf-alerts@company.com"
      from_name: "DCF API Alerts"
      to_emails: 
        - "ops@company.com"
        - "devops@company.com"
        - "platform-team@company.com"
      cc_emails:
        - "tech-leads@company.com"
      username: "${SMTP_USERNAME}"
      password: "${SMTP_PASSWORD}"
      use_tls: true
      use_starttls: true
      timeout: "30s"
      # Email template customization
      subject_template: "[{{.Severity | upper}}] DCF API Alert: {{.RuleName}}"
      body_template: |
        Alert: {{.RuleName}}
        Severity: {{.Severity}}
        Description: {{.Description}}
        
        Performance Details:
        - Test Scenario: {{.Context.TestScenario}}
        - Current Value: {{.Context.CurrentValue}}
        - Threshold: {{.Context.ThresholdValue}}
        - Change: {{.Context.PercentageChange | printf "%.2f"}}%
        
        Recommendations:
        {{range .Context.Recommendations}}
        - {{.}}
        {{end}}
        
        Triggered At: {{.TriggeredAt.Format "2006-01-02 15:04:05 UTC"}}
        Alert ID: {{.ID}}

  - id: "email-management"
    name: "Management Team Email"
    type: "email"
    enabled: true
    config:
      smtp_server: "${SMTP_SERVER:-smtp.company.com}"
      smtp_port: 587
      from_email: "dcf-alerts@company.com"
      from_name: "DCF API Critical Alerts"
      to_emails:
        - "engineering-manager@company.com"
        - "product-manager@company.com"
        - "cto@company.com"
      username: "${SMTP_USERNAME}"
      password: "${SMTP_PASSWORD}"
      use_tls: true
      timeout: "30s"

  - id: "email-executives"
    name: "Executive Team Email"
    type: "email"
    enabled: true
    config:
      smtp_server: "${SMTP_SERVER:-smtp.company.com}"
      smtp_port: 587
      from_email: "dcf-alerts@company.com"
      from_name: "DCF API Executive Alerts"
      to_emails:
        - "ceo@company.com"
        - "cto@company.com"
        - "vp-engineering@company.com"
      username: "${SMTP_USERNAME}"
      password: "${SMTP_PASSWORD}"
      use_tls: true
      timeout: "30s"
      # Executive summary template
      subject_template: "[URGENT] DCF API Service Issue - {{.RuleName}}"

  - id: "email-devops"
    name: "DevOps Team Email"
    type: "email"
    enabled: true
    config:
      smtp_server: "${SMTP_SERVER:-smtp.company.com}"
      smtp_port: 587
      from_email: "dcf-alerts@company.com"
      to_emails:
        - "devops@company.com"
        - "infrastructure@company.com"
      username: "${SMTP_USERNAME}"
      password: "${SMTP_PASSWORD}"
      use_tls: true
      timeout: "30s"

  - id: "email-finance-team"
    name: "Finance Team Email"
    type: "email"
    enabled: true
    config:
      smtp_server: "${SMTP_SERVER:-smtp.company.com}"
      smtp_port: 587
      from_email: "dcf-alerts@company.com"
      to_emails:
        - "finance-tech@company.com"
        - "quant-team@company.com"
        - "risk-management@company.com"
      username: "${SMTP_USERNAME}"
      password: "${SMTP_PASSWORD}"
      use_tls: true
      timeout: "30s"

  # Slack Channels
  - id: "slack-alerts"
    name: "General Alerts Slack Channel"
    type: "slack"
    enabled: true
    config:
      webhook_url: "${SLACK_WEBHOOK_ALERTS}"
      channel: "#dcf-api-alerts"
      username: "DCF Alert Bot"
      icon_emoji: ":warning:"
      link_names: true
      unfurl_links: false
      # Slack message customization
      message_template: |
        :{{if eq .Severity "critical"}}red_circle{{else if eq .Severity "warning"}}warning{{else}}information_source{{end}}: *{{.RuleName}}*
        
        *Severity:* {{.Severity | title}}
        *Description:* {{.Description}}
        
        *Performance Impact:*
        • Test Scenario: `{{.Context.TestScenario}}`
        • Current Value: `{{.Context.CurrentValue}}`
        • Threshold: `{{.Context.ThresholdValue}}`
        • Change: `{{.Context.PercentageChange | printf "%.2f"}}%`
        
        {{if .Context.Recommendations}}*Recommendations:*
        {{range .Context.Recommendations}}• {{.}}
        {{end}}{{end}}
        
        *Alert ID:* `{{.ID}}` | *Time:* {{.TriggeredAt.Format "15:04:05 UTC"}}

  - id: "slack-critical"
    name: "Critical Alerts Slack Channel"
    type: "slack"
    enabled: true
    config:
      webhook_url: "${SLACK_WEBHOOK_CRITICAL}"
      channel: "#dcf-api-critical"
      username: "DCF Critical Alert Bot"
      icon_emoji: ":rotating_light:"
      link_names: true
      unfurl_links: false
      # Critical alert mentions
      mentions: ["@channel", "@here"]
      message_template: |
        :rotating_light: *CRITICAL ALERT* :rotating_light:
        
        <!channel> *{{.RuleName}}*
        
        *Severity:* {{.Severity | upper}}
        *Description:* {{.Description}}
        
        *Performance Details:*
        • Test Scenario: `{{.Context.TestScenario}}`
        • Current Value: `{{.Context.CurrentValue}}`
        • Threshold: `{{.Context.ThresholdValue}}`
        • Performance Change: `{{.Context.PercentageChange | printf "%.2f"}}%`
        
        *Immediate Actions Required:*
        {{range .Context.Recommendations}}• {{.}}
        {{end}}
        
        *Alert ID:* `{{.ID}}` | *Triggered:* {{.TriggeredAt.Format "2006-01-02 15:04:05 UTC"}}

  # PagerDuty Integration
  - id: "pagerduty-oncall"
    name: "PagerDuty On-Call"
    type: "pagerduty"
    enabled: true
    config:
      integration_key: "${PAGERDUTY_INTEGRATION_KEY}"
      service_key: "${PAGERDUTY_SERVICE_KEY}"
      api_url: "https://events.pagerduty.com/v2/enqueue"
      timeout: "30s"
      # Severity mapping
      severity_mapping:
        critical: "critical"
        warning: "warning"
        info: "info"
      # Custom fields for PagerDuty
      custom_details:
        component: "dcf-valuation-api"
        service: "financial-services"
        team: "platform-engineering"
      # PagerDuty event customization
      summary_template: "DCF API Alert: {{.RuleName}} - {{.Context.TestScenario}}"
      dedup_key_template: "dcf-api-{{.RuleID}}-{{.Context.TestScenario}}"

  # Webhook Integrations
  - id: "webhook-monitoring"
    name: "External Monitoring Webhook"
    type: "webhook"
    enabled: true
    config:
      url: "${MONITORING_WEBHOOK_URL}"
      method: "POST"
      headers:
        Authorization: "Bearer ${MONITORING_WEBHOOK_TOKEN}"
        Content-Type: "application/json"
        X-Service: "dcf-valuation-api"
        X-Team: "platform-engineering"
      timeout: "15s"
      retry_count: 3
      retry_delay: "5s"
      # Webhook payload template
      payload_template: |
        {
          "service": "dcf-valuation-api",
          "alert_id": "{{.ID}}",
          "rule_id": "{{.RuleID}}",
          "rule_name": "{{.RuleName}}",
          "severity": "{{.Severity}}",
          "status": "{{.Status}}",
          "description": "{{.Description}}",
          "triggered_at": "{{.TriggeredAt.Format "2006-01-02T15:04:05Z07:00"}}",
          "context": {
            "test_scenario": "{{.Context.TestScenario}}",
            "metric": "{{.Context.Metric}}",
            "current_value": {{.Context.CurrentValue}},
            "threshold_value": {{.Context.ThresholdValue}},
            "percentage_change": {{.Context.PercentageChange}},
            "recommendations": [
              {{range $i, $rec := .Context.Recommendations}}{{if $i}},{{end}}"{{$rec}}"{{end}}
            ]
          },
          "performance_data": {{.Context.PerformanceData | toJson}},
          "tags": [
            "service:dcf-api",
            "severity:{{.Severity}}",
            "team:platform-engineering"
          ]
        }

  - id: "webhook-datadog"
    name: "Datadog Webhook Integration"
    type: "webhook"
    enabled: false  # Enable when Datadog is configured
    config:
      url: "${DATADOG_WEBHOOK_URL}"
      method: "POST"
      headers:
        DD-API-KEY: "${DATADOG_API_KEY}"
        Content-Type: "application/json"
      timeout: "10s"
      retry_count: 2

  - id: "webhook-grafana"
    name: "Grafana Webhook Integration"
    type: "webhook"
    enabled: false  # Enable when Grafana is configured
    config:
      url: "${GRAFANA_WEBHOOK_URL}"
      method: "POST"
      headers:
        Authorization: "Bearer ${GRAFANA_API_TOKEN}"
        Content-Type: "application/json"
      timeout: "10s"

  # Microsoft Teams Integration
  - id: "teams-engineering"
    name: "Engineering Team Microsoft Teams"
    type: "webhook"  # Teams uses webhook mechanism
    enabled: false  # Enable when Teams is configured
    config:
      url: "${TEAMS_WEBHOOK_URL}"
      method: "POST"
      headers:
        Content-Type: "application/json"
      timeout: "15s"
      # Teams-specific message format
      payload_template: |
        {
          "@type": "MessageCard",
          "@context": "http://schema.org/extensions",
          "themeColor": "{{if eq .Severity "critical"}}FF0000{{else if eq .Severity "warning"}}FFA500{{else}}0078D4{{end}}",
          "summary": "DCF API Alert: {{.RuleName}}",
          "sections": [
            {
              "activityTitle": "DCF API Alert",
              "activitySubtitle": "{{.RuleName}}",
              "activityImage": "https://example.com/alert-icon.png",
              "facts": [
                {
                  "name": "Severity",
                  "value": "{{.Severity | title}}"
                },
                {
                  "name": "Test Scenario", 
                  "value": "{{.Context.TestScenario}}"
                },
                {
                  "name": "Performance Change",
                  "value": "{{.Context.PercentageChange | printf "%.2f"}}%"
                },
                {
                  "name": "Triggered At",
                  "value": "{{.TriggeredAt.Format "2006-01-02 15:04:05 UTC"}}"
                }
              ],
              "markdown": true
            }
          ]
        } 