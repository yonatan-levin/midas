# DCF Valuation API - Alert Rules Configuration
# This file defines alert rules for performance monitoring and regression detection

alert_rules:
  # Critical Performance Alerts
  - id: "high_latency_critical"
    name: "Critical Latency Alert"
    description: "Alerts when average latency exceeds 500ms consistently"
    severity: "critical"
    enabled: true
    channels: ["email-ops", "slack-critical", "pagerduty-oncall"]
    conditions:
      latency_threshold:
        operator: "gt"
        value: 500.0  # 500ms
        duration: "5m"
        consecutive: 3
      regression_detection:
        method: "statistical"
        threshold: 0.25  # 25% increase
        confidence_level: 0.95
        statistical_test: "t-test"
        min_sample_size: 5
        baseline_period: "24h"
    escalation_policy:
      id: "critical_escalation"
      name: "Critical Issues Escalation"
      max_escalations: 3
      steps:
        - level: 1
          delay: "5m"
          channels: ["slack-critical"]
        - level: 2
          delay: "15m"
          channels: ["pagerduty-oncall", "email-management"]
        - level: 3
          delay: "30m"
          channels: ["email-executives"]
    suppression_windows:
      - start_time: "02:00"
        end_time: "06:00"
        days: ["saturday", "sunday"]
        timezone: "UTC"

  - id: "low_throughput_critical"
    name: "Critical Throughput Alert"
    description: "Alerts when throughput drops below 10 RPS"
    severity: "critical"
    enabled: true
    channels: ["email-ops", "slack-critical", "pagerduty-oncall"]
    conditions:
      throughput_threshold:
        operator: "lt"
        value: 10.0  # 10 RPS
        duration: "3m"
        consecutive: 2
      regression_detection:
        method: "statistical"
        threshold: 0.30  # 30% decrease
        confidence_level: 0.95
        statistical_test: "t-test"
        min_sample_size: 5
    escalation_policy:
      id: "critical_escalation"
      name: "Critical Issues Escalation"
      max_escalations: 3
      steps:
        - level: 1
          delay: "5m"
          channels: ["slack-critical"]
        - level: 2
          delay: "15m"
          channels: ["pagerduty-oncall", "email-management"]
        - level: 3
          delay: "30m"
          channels: ["email-executives"]

  - id: "high_error_rate_critical"
    name: "Critical Error Rate Alert"
    description: "Alerts when error rate exceeds 5%"
    severity: "critical"
    enabled: true
    channels: ["email-ops", "slack-critical", "pagerduty-oncall"]
    conditions:
      error_rate_threshold:
        operator: "gt"
        value: 5.0  # 5%
        duration: "2m"
        consecutive: 2
      anomaly_detection:
        method: "zscore"
        sensitivity: 8.0
        window_size: 20
        min_deviations: 2.5

  # Warning Performance Alerts
  - id: "high_latency_warning"
    name: "Warning Latency Alert"
    description: "Alerts when average latency exceeds 300ms"
    severity: "warning"
    enabled: true
    channels: ["slack-alerts"]
    conditions:
      latency_threshold:
        operator: "gt"
        value: 300.0  # 300ms
        duration: "10m"
        consecutive: 2
      trend_analysis:
        direction: "increasing"
        min_slope: 0.1
        window_size: 10
        confidence_level: 0.90

  - id: "moderate_throughput_drop"
    name: "Moderate Throughput Drop"
    description: "Alerts when throughput drops below 25 RPS"
    severity: "warning"
    enabled: true
    channels: ["slack-alerts"]
    conditions:
      throughput_threshold:
        operator: "lt"
        value: 25.0  # 25 RPS
        duration: "15m"
        consecutive: 3

  - id: "elevated_error_rate"
    name: "Elevated Error Rate"
    description: "Alerts when error rate exceeds 1%"
    severity: "warning"
    enabled: true
    channels: ["slack-alerts"]
    conditions:
      error_rate_threshold:
        operator: "gt"
        value: 1.0  # 1%
        duration: "5m"
        consecutive: 2

  # Performance Regression Detection
  - id: "performance_regression_detection"
    name: "Performance Regression Alert"
    description: "Detects statistical performance regressions"
    severity: "warning"
    enabled: true
    channels: ["slack-alerts", "email-devops"]
    conditions:
      regression_detection:
        method: "statistical"
        threshold: 0.15  # 15% change
        confidence_level: 0.95
        statistical_test: "t-test"
        min_sample_size: 10
        baseline_period: "7d"
      anomaly_detection:
        method: "iqr"
        sensitivity: 6.0
        window_size: 30
        min_deviations: 1.5

  # System Health Monitoring
  - id: "api_availability_critical"
    name: "API Availability Critical"
    description: "Alerts when API availability drops below 99%"
    severity: "critical"
    enabled: true
    channels: ["email-ops", "slack-critical", "pagerduty-oncall"]
    conditions:
      error_rate_threshold:
        operator: "gt"
        value: 1.0  # >1% error rate means <99% availability
        duration: "1m"
        consecutive: 1
    escalation_policy:
      id: "critical_escalation"
      name: "Critical Issues Escalation"
      max_escalations: 3
      steps:
        - level: 1
          delay: "5m"
          channels: ["slack-critical"]
        - level: 2
          delay: "15m"
          channels: ["pagerduty-oncall", "email-management"]
        - level: 3
          delay: "30m"
          channels: ["email-executives"]

  - id: "cache_performance_degradation"
    name: "Cache Performance Degradation"
    description: "Alerts when cache hit rate drops significantly"
    severity: "warning"
    enabled: true
    channels: ["slack-alerts"]
    conditions:
      trend_analysis:
        direction: "decreasing"
        min_slope: -0.05
        window_size: 15
        confidence_level: 0.85

  # Database Performance
  - id: "database_query_latency"
    name: "Database Query Latency Alert"
    description: "Alerts when database queries are slow"
    severity: "warning"
    enabled: true
    channels: ["slack-alerts", "email-devops"]
    conditions:
      latency_threshold:
        operator: "gt"
        value: 1000.0  # 1 second
        duration: "5m"
        consecutive: 2

  # Financial Calculation Accuracy
  - id: "dcf_calculation_errors"
    name: "DCF Calculation Errors"
    description: "Alerts when DCF calculations fail frequently"
    severity: "critical"
    enabled: true
    channels: ["email-ops", "slack-critical", "email-finance-team"]
    conditions:
      error_rate_threshold:
        operator: "gt"
        value: 0.5  # 0.5% error rate for financial calculations
        duration: "1m"
        consecutive: 1
    escalation_policy:
      id: "financial_escalation"
      name: "Financial Data Escalation"
      max_escalations: 2
      steps:
        - level: 1
          delay: "2m"
          channels: ["slack-critical", "email-finance-team"]
        - level: 2
          delay: "10m"
          channels: ["email-executives", "pagerduty-oncall"]

  # Load Testing and Capacity Planning
  - id: "capacity_threshold_warning"
    name: "Capacity Threshold Warning"
    description: "Alerts when approaching capacity limits"
    severity: "warning"
    enabled: true
    channels: ["slack-alerts", "email-devops"]
    conditions:
      throughput_threshold:
        operator: "gt"
        value: 80.0  # 80 RPS (80% of max capacity)
        duration: "10m"
        consecutive: 2
      trend_analysis:
        direction: "increasing"
        min_slope: 0.2
        window_size: 5
        confidence_level: 0.90 