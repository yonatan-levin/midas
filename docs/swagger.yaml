basePath: /api/v1
definitions:
  github_com_midas_dcf-valuation-api_internal_core_entities.AssumptionSourceValue:
    properties:
      detail:
        description: |-
          Detail is an optional provenance string, e.g.
          "accession=0000002488-26-000012 period=FY2026 conf=0.82 midpoint=$1.50B".
        type: string
      source:
        description: Source is the precedence layer that supplied this assumption's
          value.
        type: string
    type: object
  github_com_midas_dcf-valuation-api_internal_core_entities.SanityCheck:
    properties:
      flags:
        description: Specific warnings about divergences
        items:
          type: string
        type: array
      implied_ev_ebitda:
        description: DCF enterprise value / EBITDA
        type: number
      implied_pe:
        description: DCF value / EPS
        type: number
      implied_pfcf:
        description: DCF value per share / FCF per share (omitted when zero FCF)
        type: number
      is_reasonable:
        description: True if implied multiples are within 0.5x-2x of sector medians
        type: boolean
      sector_median_ev_ebitda:
        description: Sector median EV/EBITDA
        type: number
      sector_median_pe:
        description: Sector median P/E ratio
        type: number
      sector_median_pfcf:
        description: Sector median P/FCF ratio (omitted when unknown)
        type: number
    type: object
  github_com_midas_dcf-valuation-api_internal_services_valuation_profile.ResolutionTrace:
    properties:
      config_hash:
        type: string
      config_version:
        type: string
      fallback_reason:
        type: string
      human_reason:
        type: string
      matched_rule_id:
        type: string
      missing_facts:
        items:
          type: string
        type: array
      profile_id:
        type: string
      resolver_version:
        type: string
      source:
        $ref: '#/definitions/github_com_midas_dcf-valuation-api_internal_services_valuation_profile.Source'
    type: object
  github_com_midas_dcf-valuation-api_internal_services_valuation_profile.Source:
    enum:
    - explicit
    - inferred
    - fallback
    type: string
    x-enum-varnames:
    - SourceExplicit
    - SourceInferred
    - SourceFallback
  internal_api_v1_handlers.ApplicationMetrics:
    properties:
      active_connections:
        type: integer
      average_response_time:
        type: number
      cache_hit_rate:
        type: number
      database_connections:
        type: integer
      error_rate:
        type: number
      total_requests:
        type: integer
    type: object
  internal_api_v1_handlers.AppliedOverride:
    description: Per-knob override echo in the applied_overrides response field
    properties:
      source:
        description: Source is the precedence layer that supplied this value. Always
          "request" in v1.
        type: string
      value:
        description: |-
          Value is the resolved scalar that the engine used. Type matches the knob:
          float64 for rate/multiplier fields, int for year fields, string for method fields.
    type: object
  internal_api_v1_handlers.BulkFailure:
    properties:
      error_code:
        type: string
      knob:
        description: |-
          Knob is the name of the override parameter that caused an INVALID_OVERRIDE
          error. Empty (and omitted) for non-override error codes. Mirrors the
          context.knob field in the single-ticker 422 ErrorResponse.
        type: string
      message:
        type: string
      ticker:
        type: string
    type: object
  internal_api_v1_handlers.BulkFairValueRequest:
    description: Bulk fair value calculation request for multiple tickers
    properties:
      options:
        allOf:
        - $ref: '#/definitions/internal_api_v1_handlers.ValuationOverrides'
        description: |-
          Options carries structured per-request valuation knob overrides applied to
          ALL tickers in the batch. When set, it must not duplicate any knob that is
          also set via the legacy OverrideBeta / OverrideRiskFree fields — the
          request is rejected 422 with code "INVALID_OVERRIDE" if both are present
          for the same knob.
      override_beta:
        description: Optional beta override (legacy; prefer options.beta)
        example: 1.2
        type: number
      override_rf:
        description: Optional risk-free rate override (legacy; prefer options.risk_free_rate)
        example: 0.045
        type: number
      tickers:
        description: Stock ticker symbols (max 10)
        example:
        - '["AAPL"'
        - '"MSFT"'
        - '"GOOGL"]'
        items:
          type: string
        maxItems: 10
        minItems: 1
        type: array
    required:
    - tickers
    type: object
  internal_api_v1_handlers.BulkFairValueResponse:
    properties:
      failures:
        items:
          $ref: '#/definitions/internal_api_v1_handlers.BulkFailure'
        type: array
      results:
        items:
          $ref: '#/definitions/internal_api_v1_handlers.FairValueResponse'
        type: array
      summary:
        $ref: '#/definitions/internal_api_v1_handlers.BulkSummary'
    type: object
  internal_api_v1_handlers.BulkSummary:
    properties:
      failed:
        type: integer
      successful:
        type: integer
      total_requested:
        type: integer
    type: object
  internal_api_v1_handlers.BusinessMetrics:
    properties:
      average_growth_rate:
        type: number
      average_wacc:
        type: number
      failed_valuations:
        type: integer
      successful_valuations:
        type: integer
      total_valuations:
        type: integer
      unique_tickers_served:
        type: integer
    type: object
  internal_api_v1_handlers.CleaningAdjustment:
    description: One datacleaner normalization adjustment that fired on the inputs
    properties:
      amount:
        description: Amount is the signed monetary delta the adjuster applied, in
          USD.
        example: 1234.5
        type: number
      category:
        description: |-
          Category is the rule family: "asset_quality" | "liability_completeness" |
          "earnings_normalization".
        example: asset_quality
        type: string
      from_account:
        description: FromAccount is the source balance-sheet / income-statement line
          item.
        example: Goodwill
        type: string
      percentage:
        description: |-
          Percentage is the proportional change relative to the pre-adjustment
          value, when the adjuster reports one (Restater family). Omitted otherwise.
        example: 12.5
        type: number
      reasoning:
        description: Reasoning is the human-readable explanation of why the adjuster
          fired.
        example: Excluded goodwill of $1234.5M from invested capital
        type: string
      rule:
        description: |-
          Rule is the config rule identifier that fired (entities.Adjustment.RuleID),
          e.g. "goodwill_exclusion", "contingent_liabilities", "right_of_use_assets".
        example: goodwill_exclusion
        type: string
      to_account:
        description: |-
          ToAccount is the destination line item for reclassifications; empty for
          overlays and pure exclusions.
        example: EstimatedLiabilities
        type: string
      type:
        description: |-
          Type is the adjustment kind: "exclude" | "writedown" | "valuation_allowance" |
          "reclassify" | "treat_as_debt" | "probability_weighted" | "flag".
        example: exclude
        type: string
    type: object
  internal_api_v1_handlers.DetailedHealthCheckResponse:
    properties:
      checks:
        additionalProperties:
          $ref: '#/definitions/internal_api_v1_handlers.HealthCheck'
        type: object
      metadata:
        additionalProperties: true
        type: object
      service:
        type: string
      status:
        type: string
      timestamp:
        type: string
      uptime:
        type: string
      version:
        type: string
    type: object
  internal_api_v1_handlers.ErrorResponse:
    description: Standard error response following RFC 7807 Problem Details
    properties:
      code:
        description: Error code (RFC 7807 extension)
        example: INVALID_TICKER
        type: string
      context:
        additionalProperties: true
        description: Additional context information
        type: object
      detail:
        description: Human-readable explanation
        example: Invalid ticker format
        type: string
      instance:
        description: URI reference to specific occurrence
        example: /api/v1/fair-value/INVALID
        type: string
      method:
        description: HTTP method (RFC 7807 extension)
        example: GET
        type: string
      status:
        description: HTTP status code
        example: 400
        type: integer
      timestamp:
        description: ISO 8601 timestamp (RFC 7807 extension)
        type: string
      title:
        description: Human-readable title
        example: Bad Request
        type: string
      type:
        description: Problem type URI
        example: https://problems.midas.dev/INVALID_TICKER
        type: string
    type: object
  internal_api_v1_handlers.FairValueResponse:
    description: Fair value calculation response with intrinsic valuation metrics
    properties:
      adr_ratio_applied:
        description: |-
          ADRRatioApplied is the ordinary-shares-per-ADR multiplier that the
          valuation engine divided SEC-reported share counts by before
          computing per-share values, so the resulting fair value compares
          like-for-like with the listed ADR price. 1 for domestic 10-K filers
          (and any ticker absent from config/adr_ratios.json); non-1 for
          configured ADRs (TSM=5, BABA=8, …). Phase B10 of the IFRS-FPI plan.
          Omitted from the JSON when zero (defensive — the service always
          stamps a positive int via ADRRatios.Get, but omitempty keeps the
          response clean if a future bug produces 0).
        example: 5
        type: integer
      applied_overrides:
        additionalProperties:
          $ref: '#/definitions/internal_api_v1_handlers.AppliedOverride'
        description: |-
          AppliedOverrides echoes the valuation knobs that were explicitly set by
          the request, each with the resolved value and source "request". Absent
          (omitempty) when no overrides were supplied — default GET responses and
          POST{} requests are byte-identical (TestPostFairValue_EmptyBody_EqualsGET
          pins this). Only request-sourced knobs are echoed in v1 (design §8 R5).

          Each entry:
            "knob_name": { "value": <resolved scalar>, "source": "request" }

          Example with two overrides:
            "applied_overrides": {
              "tax_rate":    { "value": 0.21,  "source": "request" },
              "horizon_years": { "value": 7,   "source": "request" }
            }
        type: object
      as_of:
        description: Timestamp of calculation
        example: "2025-08-13T22:15:34.402652598Z"
        type: string
      assumption_profile:
        description: |-
          Tier 2 P0b additive fields. All omitempty — legacy mature-large-bank
          DDM responses remain byte-identical (TestDDM_LegacyPath_BitForBit
          pins this). AssumptionProfile is the resolved profile_id so API
          consumers can correlate the result with the calibration record.
          ResolutionTrace carries the full audit trail (matched_rule_id,
          fallback_reason, config_hash) for replay determinism and audit. The
          DCF diagnostic fields are declared here for schema ownership in P0b
          even though P2 fills them — keeps the wire shape stable from this
          commit forward.
        example: mature_large_bank:mature
        type: string
      assumption_sources:
        additionalProperties:
          $ref: '#/definitions/github_com_midas_dcf-valuation-api_internal_core_entities.AssumptionSourceValue'
        description: |-
          AssumptionSources records, per near-term assumption (e.g. "capex_year1"),
          which authority level supplied the final value — one of user_override |
          guidance | profile | historical | default — with a provenance detail
          (Layer-B Phase-2 §9.2). Populated ONLY when a non-default source fires (e.g.
          a high-confidence guidance fixture anchors year-1); absent (omitempty) on the
          default path, so guidance-free responses stay byte-identical to the 4.7
          engine. Example:
            "assumption_sources": {
              "capex_year1": { "source": "guidance", "detail": "accession=… conf=0.82 midpoint=$1.50B" }
            }
        type: object
      calculation_method:
        description: 'Model used: multi_stage_dcf, ddm, ffo, revenue_multiple'
        example: multi_stage_dcf
        type: string
      calculation_version:
        description: Engine version that produced this result
        example: "4.10"
        type: string
      cleaning_adjustments:
        description: |-
          CleaningAdjustments is the datacleaner audit trail: one entry per
          normalization adjuster that FIRED on this company's financials (A1–C7,
          the B1/B2/B3 overlays, and the TDB-2 A6/A7 + TDB-12 contingent
          overlays), projected from result.CleaningAdjustments via
          adjustmentsFromLedger. Lets consumers see which restatements/overlays
          shaped the valuation inputs (e.g. lease capitalization, inventory
          restatement, excess-cash exclusion). Omitted (omitempty) when no
          adjuster fired, so the default no-adjustment response stays
          byte-identical to the pre-TDB-11 wire shape. Fired-only — the
          projection emits only Applied==true entries.
        items:
          $ref: '#/definitions/internal_api_v1_handlers.CleaningAdjustment'
        type: array
      currency:
        description: |-
          Currency is the ISO-4217 code that dcf_value_per_share and
          tangible_value_per_share are denominated in. Always "USD" — the
          valuation service FX-converts each period's reporting-currency
          monetary fields to USD via Phase B9 of the IFRS-FPI plan
          (docs/refactoring/archive/ifrs-foreign-private-issuer-support-spec.md), so
          API consumers MUST NOT re-convert. Surfaced so a downstream client
          can display "USD" alongside the per-share value rather than guessing.
        example: USD
        type: string
      current_assets_per_share:
        description: |-
          Graham-school asset-floor diagnostics — see
          docs/refactoring/archive/graham-floor-metrics-spec.md. All four use *float64 +
          omitempty: nil = TotalLiabilities unresolved (a warning is appended to
          `warnings`). Non-nil = resolved; values may be negative (NCAV on
          distressed companies) or 0 (floor clamped when NCAV is negative). Pointer
          types preserve the deep-distress signal (resolved + negative + clamped)
          distinct from the unresolved-fallback signal (all four absent + warning).
        example: 55.13
        type: number
      current_price:
        description: |-
          CurrentPrice is the live per-share market price captured from the
          market-data gateway (Yahoo Finance / Finzive) at the moment the
          valuation was computed. Same denomination and per-share basis as
          DCFValuePerShare and TangibleValuePerShare — for ADRs this is the
          per-ADR exchange price, directly comparable to the per-ADR DCF
          value the engine produces after applyADRRatio. Surfaced so a
          consumer can compute the upside/downside discount ((dcf - price)
          / price) without a second quote lookup. Omitted when zero.
        example: 190.25
        type: number
      data_quality_grade:
        description: Data quality grade (A-F)
        example: B
        type: string
      data_quality_score:
        description: Data quality score (0-100)
        example: 85.5
        type: number
      dcf_base_normalization:
        description: |-
          DCFBaseNormalization (VAL-1 Phase 3): "latest" | "3y_mean". Omitempty +
          present only on the cyclical DCF path, so non-cyclical responses are
          byte-identical (no key emitted).
        example: 3y_mean
        type: string
      dcf_exit_multiple_terminal_value:
        example: 21000000000
        type: number
      dcf_gordon_terminal_value:
        description: |-
          DCFGordonTerminalValue / DCFExitMultipleTerminalValue (VAL-1 Phase 4):
          the two raw terminal-value estimates (nominal, pre-discount, pre-blend) on
          an EV/EBITDA basis. The blended primary stays enterprise_value /
          dcf_value_per_share; dcf_terminal_method names the driving method.
          dcf_exit_multiple_terminal_value is omitted on the pure-Gordon path
          (byte-identical non-exit-multiple responses).
        example: 18200000000
        type: number
      dcf_horizon_years:
        example: 5
        type: integer
      dcf_per_year_pv:
        items:
          type: number
        type: array
      dcf_terminal_growth_used:
        type: number
      dcf_terminal_method:
        example: gordon_growth
        type: string
      dcf_terminal_pct_of_ev:
        type: number
      dcf_value_per_share:
        description: Discounted cash flow fair value per share
        example: 156.42
        type: number
      graham_discount_pct:
        example: 23.3
        type: number
      graham_floor_per_share:
        example: 3.03
        type: number
      growth_confidence:
        description: Growth estimation confidence
        example: high
        type: string
      growth_rate:
        description: Summary growth rate (CAGR of projected rates)
        example: 0.045
        type: number
      growth_rates:
        description: Per-year projected growth rates
        items:
          type: number
        type: array
      growth_source:
        description: Growth estimation source
        example: analyst_blend
        type: string
      industry:
        allOf:
        - $ref: '#/definitions/internal_api_v1_handlers.Industry'
        description: Dual industry classification (SIC + heuristic) for drift detection
      ncav_per_share:
        example: 4.55
        type: number
      paffo_value_per_share:
        example: 31.5
        type: number
      pffo_value_per_share:
        description: |-
          VAL-3 Phase 2 — REIT FFO/AFFO. Both omitempty: present only on REIT
          (FFO-model) responses; absent for DCF/DDM/revenue_multiple. PFFO is the
          FFO-based number (always present on REIT responses); PAFFO is the AFFO-based
          number, present only when maintenance capex is disclosed OR estimable
          (0.7× capex). When PAFFO is present it equals the headline intrinsic value
          (dcf_value_per_share); when absent the headline is PFFO.
        example: 42.1
        type: number
      resolution_trace:
        $ref: '#/definitions/github_com_midas_dcf-valuation-api_internal_services_valuation_profile.ResolutionTrace'
      sanity_check:
        allOf:
        - $ref: '#/definitions/github_com_midas_dcf-valuation-api_internal_core_entities.SanityCheck'
        description: Multiples cross-check against sector medians
      tangible_value_per_share:
        description: Net tangible book value per share
        example: 24.73
        type: number
      ticker:
        description: Stock ticker symbol
        example: AAPL
        type: string
      wacc:
        description: Weighted Average Cost of Capital
        example: 0.092
        type: number
      warnings:
        description: Data quality or assumption warnings
        items:
          type: string
        type: array
    type: object
  internal_api_v1_handlers.GrowthStages:
    description: Three-stage growth estimator duration overrides
    properties:
      stage1_years:
        example: 3
        type: integer
      stage2_years:
        example: 4
        type: integer
      stage3_years:
        example: 0
        type: integer
    type: object
  internal_api_v1_handlers.HealthCheck:
    properties:
      details:
        additionalProperties: true
        type: object
      duration:
        $ref: '#/definitions/time.Duration'
      last_checked:
        type: string
      message:
        type: string
      status:
        description: '"healthy", "unhealthy", "degraded"'
        type: string
    type: object
  internal_api_v1_handlers.Industry:
    description: Dual industry classification (SIC + heuristic) with a Match flag
    properties:
      heuristic_code:
        description: GICS sector code from IndustryClassifier.ClassifyIndustry
        example: "45"
        type: string
      heuristic_name:
        description: GICS sector name
        example: Information Technology
        type: string
      match:
        description: true when SIC and heuristic agree per the canonical mapping
        example: true
        type: boolean
      sic:
        description: SIC-derived industry label from IndustryClassifier.Classify
        example: MFG
        type: string
      sic_code:
        description: Raw SIC code from SEC (may be empty if SEC data lacked it)
        example: "3674"
        type: string
    type: object
  internal_api_v1_handlers.MetricsResponse:
    properties:
      application:
        $ref: '#/definitions/internal_api_v1_handlers.ApplicationMetrics'
      business:
        $ref: '#/definitions/internal_api_v1_handlers.BusinessMetrics'
      system:
        $ref: '#/definitions/internal_api_v1_handlers.SystemMetrics'
      timestamp:
        type: string
    type: object
  internal_api_v1_handlers.SingleFairValueRequest:
    description: POST body for single-ticker fair-value calculation with optional
      overrides
    properties:
      options:
        allOf:
        - $ref: '#/definitions/internal_api_v1_handlers.ValuationOverrides'
        description: |-
          Options carries per-request valuation knob overrides. Nil or absent means
          "use engine defaults" — identical to calling the GET endpoint.
    type: object
  internal_api_v1_handlers.SystemMetrics:
    properties:
      gc_count:
        type: integer
      go_version:
        type: string
      last_gc:
        type: string
      memory_alloc:
        type: integer
      memory_sys:
        type: integer
      memory_total:
        type: integer
      num_cpu:
        type: integer
      num_goroutines:
        type: integer
      uptime_seconds:
        type: integer
    type: object
  internal_api_v1_handlers.ValuationOverrides:
    description: Per-request valuation knob overrides (all fields optional)
    properties:
      beta:
        description: |-
          Beta is the equity beta used in the CAPM cost-of-equity calculation.
          Negative values are allowed (inverse-correlated assets).
          Conflicts with the legacy override_beta field on the bulk request.
        example: 1.2
        type: number
      growth_stages:
        allOf:
        - $ref: '#/definitions/internal_api_v1_handlers.GrowthStages'
        description: |-
          GrowthStages overrides the three-stage growth estimator configuration.
          When any sub-field is set a per-request estimator is built instead of
          reusing the shared service-level estimator.
      horizon_years:
        description: |-
          DCF forecast horizon in years. When omitted the engine uses the length of
          the growth-rate slice produced by the estimator (legacy signal).
        example: 5
        type: integer
      market_risk_premium:
        description: |-
          MarketRiskPremium is the equity risk premium (ERP) added to the risk-free
          rate in CAPM. Must be ≥ 0; a negative ERP is economically unsound and
          will be caught by Layer-1 validation (T7).
        example: 0.05
        type: number
      max_growth_rate:
        description: |-
          MaxGrowthRate is the upper clamp applied inside the growth estimator.
          Defaults to 0.5 (50%). Negative values are meaningless here but accepted.
        example: 0.5
        type: number
      min_growth_rate:
        description: |-
          MinGrowthRate is the lower clamp applied inside the growth estimator.
          Defaults to -0.3 (-30%). Negative values represent contraction scenarios.
        example: -0.3
        type: number
      risk_free_rate:
        description: |-
          RiskFreeRate is the nominal risk-free rate (e.g. 10-year Treasury yield).
          Negative values are allowed (EUR/JPY/CHF regimes).
          Conflicts with the legacy override_rf field on the bulk request and the
          override_rf query parameter on the GET single-ticker endpoint.
        example: 0.045
        type: number
      tax_rate:
        description: |-
          TaxRate is the effective corporate tax rate applied to FCF, WACC, and the
          alt-model ModelInput. Negative values are allowed (NOLs / tax credits).
        example: 0.21
        type: number
      terminal_growth_cap:
        description: |-
          Cap applied during auto-derivation of the terminal growth rate.
          Defaults to 0.03 (3%). Has no effect when terminal_growth_rate is set explicitly.
        example: 0.03
        type: number
      terminal_growth_rate:
        description: |-
          Terminal growth rate — explicit absolute value for g in Gordon Growth Model.
          Negative values are allowed (real-terms decline). If omitted the engine
          auto-derives g from historical CAGR, capped by terminal_growth_cap.
        example: -0.01
        type: number
      terminal_method:
        description: |-
          TerminalMethod selects the terminal-value calculation model.
          Allowed values: "gordon_growth" (default) | "exit_multiple".
            - "gordon_growth" SUPPRESSES exit-multiple blending: the terminal value is a
              pure Gordon Growth perpetuity (no exit multiple is mixed in).
            - "exit_multiple" BLENDS an exit-multiple terminal value 50/50 with the Gordon
              Growth terminal value (the engine AVERAGES the two estimates to reduce
              single-model dependence; it is NOT a pure exit-multiple terminal value).
              It requires that a multiple is resolvable (via terminal_multiple or the
              industry default); if neither is available the request is rejected 422.
        example: exit_multiple
        type: string
      terminal_multiple:
        description: |-
          TerminalMultiple is the EV/EBITDA (or analogous) exit multiple used when
          terminal_method is "exit_multiple". When omitted the engine falls back to
          the industry default looked up at resolution time.
        example: 14
        type: number
    type: object
  time.Duration:
    enum:
    - -9223372036854775808
    - 9223372036854775807
    - 1
    - 1000
    - 1000000
    - 1000000000
    - 60000000000
    - 3600000000000
    type: integer
    x-enum-varnames:
    - minDuration
    - maxDuration
    - Nanosecond
    - Microsecond
    - Millisecond
    - Second
    - Minute
    - Hour
externalDocs:
  description: OpenAPI Specification
  url: /docs/openapi.yaml
host: localhost:8080
info:
  contact:
    email: support@midas.dev
    name: API Support
    url: https://midas.dev/support
  description: |-
    DCF (Discounted Cash Flow) Valuation API provides intrinsic value calculations for publicly traded companies.
    The API computes Net Tangible Asset Value and DCF Fair Value per share using SEC filings and market data.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://midas.dev/terms
  title: DCF Valuation API
  version: "1.0"
paths:
  /fair-value/{ticker}:
    get:
      consumes:
      - application/json
