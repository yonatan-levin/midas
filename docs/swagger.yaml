  /health/detailed:
    get:
      description: Reports component-level health for the database, cache, external
        APIs (SEC/market/macro), memory, and rate limiter, plus an aggregate status.
        Returns 200 when healthy, 206 (Partial Content) when degraded, and 503 when
        any component is unhealthy.
      produces:
      - application/json
      responses:
        "200":
          description: All components healthy
          schema:
            $ref: '#/definitions/internal_api_v1_handlers.DetailedHealthCheckResponse'
        "206":
          description: One or more components degraded
          schema:
            $ref: '#/definitions/internal_api_v1_handlers.DetailedHealthCheckResponse'
        "401":
