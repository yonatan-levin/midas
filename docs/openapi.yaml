openapi: 3.0.3
info:
  title: Midas DCF Valuation API
  version: 0.9.0-rc1
  description: |
    REST API exposing intrinsic value metrics per ticker.
    - Net Tangible Asset Value per share
    - DCF Fair Value per share (7-year explicit projection, WACC-discounted)
servers:
  - url: http://localhost:8080
    description: Local development
security:
  - ApiKeyAuth: []
paths:
  /health:
    get:
      summary: Basic liveness probe
      tags: [health]
      security: []
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  timestamp: { type: string, format: date-time }
                  service: { type: string, example: dcf-valuation-api }
  /ready:
    get:
      summary: Readiness probe
      tags: [health]
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ready }
                  timestamp: { type: string, format: date-time }
                  checks:
                    type: object
                    properties:
                      database: { type: string }
                      external_apis: { type: string }
                      cache: { type: string }
  /version:
    get:
      summary: Application version info
      tags: [health]
      security: []
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string, example: '0.9.0-rc1' }
                  environment: { type: string, example: development }
                  build_time: { type: string }
                  git_commit: { type: string }
  /api/v1/fair-value/{ticker}:
    get:
      summary: Get fair value for a ticker
      tags: [valuation]
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 5
        - name: override_beta
          in: query
          required: false
          schema:
            type: number
            format: float
        - name: override_rf
          in: query
          required: false
          schema:
            type: number
            format: float
      responses:
        '200':
          description: Fair value metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FairValueResponse'
        '400':
          description: Invalid ticker or request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Ticker not present in SEC's ticker→CIK index (genuinely unknown symbol)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Ticker resolves but cannot be valued. The `code` field in the
            response body distinguishes between the cases:

            * `INSUFFICIENT_DATA` — SEC has no usable US-GAAP XBRL facts
              (clinical-stage biotechs, pre-revenue issuers).
            * `FOREIGN_PRIVATE_ISSUER_UNSUPPORTED` — SEC filing uses
              ifrs-full taxonomy from a Form 20-F (TSM, ASML, NVO, AZN, SAP,
              BABA, …); the data exists but Midas cannot yet parse IFRS.
              The `context` field carries `taxonomy` and `filing_type`.
            * `MODEL_NOT_APPLICABLE` — no industry-aware model produced a
              result (e.g., negative operating income with no fallback).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/fair-value/bulk:
    post:
      summary: Get fair value for multiple tickers
      tags: [valuation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkFairValueRequest'
      responses:
        '200':
          description: Bulk fair value results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkFairValueResponse'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/health/detailed:
    get:
      summary: Detailed health check
      tags: [health]
      responses:
        '200': { description: Healthy }
        '206': { description: Degraded }
        '503': { description: Unhealthy }
        '401': { description: Authentication required }
  /api/v1/metrics:
    get:
      summary: Application and business metrics
      tags: [metrics]
      responses:
        '200': { description: Metrics JSON }
        '401': { description: Authentication required }
  /api/v1/auth/keys:
    post:
      summary: Create API key (admin)
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, permissions]
              properties:
                user_id:
                  type: string
                permissions:
                  type: array
                  items:
                    type: string
      responses:
        '201': { description: Created }
        '400': { description: Invalid request }
        '401': { description: Authentication required }
        '403': { description: Insufficient permissions }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Industry:
      type: object
      description: |
        Dual industry classification — both the SIC-derived label (used
        internally to select the valuation model) and the balance-sheet
        heuristic label (used by the datacleaner). The `match` flag is true
        when the two classifiers agree per the canonical SIC -> GICS mapping,
        and false otherwise. A false match signals potential classifier drift
        worth investigating; see
        docs/superpowers/specs/2026-04-23-industry-in-response-design.md.
      properties:
        sic_code:
          type: string
          description: Raw SIC code from SEC (omitted if unavailable)
          example: "3674"
        sic:
          type: string
          description: SIC-derived industry label (TECH, MFG, RETAIL, UTIL, FINL, HEALTH, NA)
          example: "MFG"
        heuristic_code:
          type: string
          description: GICS sector code from the balance-sheet heuristic classifier
          example: "45"
        heuristic_name:
          type: string
          description: Human-readable GICS sector name
          example: "Information Technology"
        match:
          type: boolean
          description: True when SIC and heuristic agree per the canonical mapping
          example: true
    FairValueResponse:
      type: object
      properties:
        ticker:
          type: string
        wacc:
          type: number
          format: float
        growth_rate:
          type: number
          format: float
        tangible_value_per_share:
          type: number
          format: float
        dcf_value_per_share:
          type: number
          format: float
        growth_rates:
          type: array
          items:
            type: number
            format: float
          description: |
            Per-year growth rates for the explicit projection period (years 1-7).
            Stage 1 (years 1-3) = high-growth rate from analyst/historical blend;
            Stage 2 (years 4-7) = linear fade toward terminal rate.
          example: [0.05, 0.048, 0.046, 0.044, 0.042, 0.038, 0.034]
        dcf_horizon_years:
          type: integer
          example: 5
          description: |
            Number of explicit DCF projection years the engine used before
            handing off to the terminal-value calculation. Resolved from the
            ticker's archetype profile (VAL-1 Phase 2 — Tier 2 P2): mature
            large-cap = 3, standard growth = 5, high-growth profitable = 7,
            hyper-growth = 10. Always equals `len(dcf_per_year_pv)`. Omitted
            when zero (non-DCF model fired — e.g. DDM / FFO / Revenue
            Multiple), since those models do not project explicit yearly cash
            flows.
        dcf_terminal_method:
          type: string
          enum: [gordon_growth, exit_multiple]
          example: "gordon_growth"
          description: |
            How the engine computed the terminal value. `gordon_growth` =
            Gordon perpetual-growth formula on year-N FCF with the clamped
            terminal growth rate (the only method today). `exit_multiple` =
            year-N revenue × mature-sector EV/Revenue multiple, reserved for
            future archetype profiles where Gordon stability is implausible
            at the explicit-horizon boundary (VAL-1 Phase 4). Omitted on
            non-DCF model paths.
        dcf_terminal_pct_of_ev:
          type: number
          format: float
          example: 0.62
          description: |
            Ratio of discounted terminal value to total enterprise value
            (`terminal_pv / enterprise_value`). Damodaran's healthy band is
            roughly 0.60-0.80; values above 0.80 indicate the model is
            implicitly "betting on the terminal year" rather than the
            explicit forecast. When this exceeds 0.80 the engine appends a
            `terminal_dominance` warning to `warnings` so operators can flag
            for review. Omitted when zero (non-DCF model or degenerate
            enterprise_value).
        dcf_per_year_pv:
          type: array
          items:
            type: number
            format: float
          example: [12.4, 11.8, 11.1, 10.3, 9.5]
          description: |
            Present value of each explicit projection year's free cash flow,
            in the same currency and per-share basis as `dcf_value_per_share`.
            Length always equals `dcf_horizon_years`. Chart-friendly — a
            consumer can render the explicit-period waterfall directly from
            this array and overlay it against `dcf_terminal_pct_of_ev` to
            visualize the explicit-vs-terminal composition of the valuation.
            Omitted on non-DCF model paths.
        dcf_terminal_growth_used:
          type: number
          format: float
          example: 0.025
          description: |
            The terminal growth rate that actually fed into the Gordon
            formula after the WACC-spread guardrail clamped it. The engine
            requires `terminal_growth <= WACC - 2%` to keep the Gordon
            denominator stable; when the requested terminal rate (typically
            3% default or profile-driven) would violate that spread, this
            field reports the clamped value so consumers can detect when
            their WACC was tight enough to suppress the input. Omitted on
            non-DCF model paths.
        growth_source:
          type: string
          enum: [analyst_blend, historical_only, default]
          description: How growth was estimated.
        growth_confidence:
          type: string
          enum: [high, medium, low]
          description: Confidence in the estimated growth rate.
        calculation_method:
          type: string
          enum: [multi_stage_dcf, ddm, ffo, revenue_multiple]
          description: |
            Which valuation model fired. Industry-aware router: REITs route to
            `ffo`, banks to `ddm`, negative-OI tickers to `revenue_multiple`,
            everything else to `multi_stage_dcf`.
        calculation_version:
          type: string
          example: "4.1"
          description: |
            Calculation engine version. Bumped on shape-changing or breaking-numeric
            changes (e.g., 4.1 added Graham-floor diagnostic fields and flipped the
            tangible_value_per_share denominator to diluted shares).
        warnings:
          type: array
          items:
            type: string
          description: |
            Diagnostic warnings — sanity-check flags, revenue-base source path
            (e.g. "revenue_base: source=ANNUAL_FY revenue=$467641000"), sector-multiple
            applied notice (e.g. "Applied 6.5x EV/Revenue multiple for MFG_SEMI sector"),
            NAV-divergence (FFO model), Graham-floor unresolved, etc.
        sanity_check:
          $ref: '#/components/schemas/SanityCheck'
        current_assets_per_share:
          type: number
          format: float
          nullable: true
          example: 55.13
          description: |
            Current assets divided by diluted shares. Pure asset-side floor
            with no liability subtraction. Returned as null (omitted from
            JSON) when total_liabilities cannot be resolved (a warning is
            added to `warnings`).
        ncav_per_share:
          type: number
          format: float
          nullable: true
          example: 4.55
          description: |
            Net Current Asset Value per share — Graham's classic deep-value
            metric: (current_assets - total_liabilities) / diluted_shares.
            May be negative when liabilities exceed current assets (the raw
            value is returned, no clamping). Returned as null (omitted)
            when total_liabilities cannot be resolved.
        graham_floor_per_share:
          type: number
          format: float
          nullable: true
          example: 3.03
          description: |
            "Buy below" trigger per Graham — max(ncav_per_share * 2/3, 0).
            **The value 0 stays in the JSON** when present — clamped from a
            negative NCAV — and represents "no asset floor exists, the
            company has more obligations than liquid assets". Returned as
            null (omitted) only when total_liabilities cannot be resolved
            (distinct signal: data unavailable vs. data says zero).
        graham_discount_pct:
          type: number
          format: float
          nullable: true
          example: 23.30
          description: |
            Ratio (current_price - graham_floor_per_share) / graham_floor_per_share.
            Positive = price above the floor (normal market pricing or
            overvalued vs. floor); negative = price below the floor (Graham
            net-net territory). Returned as null (omitted from JSON) when
            graham_floor_per_share is 0 (divide-by-zero would otherwise
            produce a meaningless infinity signal) or when current_price
            is unavailable.
        as_of:
          type: string
          format: date-time
        data_quality_score:
          type: number
          format: float
        data_quality_grade:
          type: string
        industry:
          $ref: '#/components/schemas/Industry'
        currency:
          type: string
          example: "USD"
          description: |
            ISO-4217 code that dcf_value_per_share and tangible_value_per_share
            are denominated in. Always "USD" — the valuation engine FX-converts
            every period's reporting-currency monetary fields to USD via Phase B9
            of the IFRS-FPI plan before any math runs. Surfaced for transparency
            so API consumers do not re-convert.
        adr_ratio_applied:
          type: integer
          example: 5
          description: |
            Ordinary-shares-per-ADR multiplier the engine divided SEC-reported
            share counts by before computing per-share values. 1 for domestic
            10-K filers and unknown tickers; non-1 for configured ADRs (TSM=5,
            BABA=8, ...). Phase B10 of the IFRS-FPI plan. Omitted when zero.
        current_price:
          type: number
          format: float
          example: 190.25
          description: |
            Live per-share market price captured from the market-data gateway
            (Yahoo Finance / Finzive) at the moment the valuation was computed.
            Same denomination and per-share basis as dcf_value_per_share and
            tangible_value_per_share — for ADRs this is the per-ADR exchange
            price, directly comparable to the per-ADR DCF value the engine
            produces after applyADRRatio. Surfaced so consumers can compute
            the upside/downside discount ((dcf - price) / price) without a
            second quote lookup. Omitted when zero (delisted or unavailable).
    BulkFairValueRequest:
      type: object
      required: [tickers]
      properties:
        tickers:
          type: array
          minItems: 1
          maxItems: 10
          items:
            type: string
        override_beta:
          type: number
          format: float
        override_rf:
          type: number
          format: float
    BulkSummary:
      type: object
      properties:
        total_requested:
          type: integer
        successful:
          type: integer
        failed:
          type: integer
    BulkFairValueResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/FairValueResponse'
        summary:
          $ref: '#/components/schemas/BulkSummary'
    ErrorResponse:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        context:
          type: object
          additionalProperties: true
    SanityCheck:
      type: object
      description: |
        Cross-validation against sector median multiples. Advisory only —
        flags are emitted to `warnings[]` but do not invalidate the valuation.
        Populated only when the multi_stage_dcf path fires AND
        config/industry_multiples.json has matching sector entries.
      properties:
        implied_pe:
          type: number
          format: float
          nullable: true
          description: DCF Value / EPS
        implied_ev_ebitda:
          type: number
          format: float
          nullable: true
          description: Enterprise Value / EBITDA
        implied_pfcf:
          type: number
          format: float
          nullable: true
          description: DCF Value / FCF per Share
        sector_median_pe:
          type: number
          format: float
        sector_median_ev_ebitda:
          type: number
          format: float
        sector_median_pfcf:
          type: number
          format: float
        is_reasonable:
          type: boolean
          description: |
            true when ALL implied multiples fall within [0.5x, 2.0x] of their
            sector median; false when any one breaches.
        flags:
          type: array
          items:
            type: string
          description: |
            Per-metric flag strings for any breach, e.g.
            "DCF-implied P/E (9.3) is <0.5x sector median (28.0) for TECH".


