openapi: 3.0.3
info:
  title: Midas DCF Valuation API
  version: 0.9.0-rc1
  description: |
    REST API exposing intrinsic value metrics per ticker.
    - Net Tangible Asset Value per share
    - DCF Fair Value per share (archetype-driven explicit horizon of 3-10 years, WACC-discounted)
servers:
  - url: http://localhost:8080
    description: Local development
security:
  - ApiKeyAuth: []
paths:
  /health:
    get:
      summary: Basic liveness probe
      tags: [health]
      security: []
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  timestamp: { type: string, format: date-time }
                  service: { type: string, example: dcf-valuation-api }
  /ready:
    get:
      summary: Readiness probe
      tags: [health]
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ready }
                  timestamp: { type: string, format: date-time }
                  checks:
                    type: object
                    properties:
                      database: { type: string }
                      external_apis: { type: string }
                      cache: { type: string }
  /version:
    get:
      summary: Application version info
      tags: [health]
      security: []
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string, example: '0.9.0-rc1' }
                  environment: { type: string, example: development }
                  build_time: { type: string }
                  git_commit: { type: string }
  /api/v1/fair-value/{ticker}:
    get:
      summary: Get fair value for a ticker
      tags: [valuation]
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 5
        - name: override_beta
          in: query
          required: false
          description: |
            Override calculated beta for WACC computation.
            Out-of-range values return **400** `INVALID_PARAMETER`
            (legacy GET range check — distinct from the POST options-path
            which returns 422 `INVALID_OVERRIDE`).
          schema:
            type: number
            format: float
            minimum: 0
            maximum: 3
        - name: override_rf
          in: query
          required: false
          description: |
            Override risk-free rate.
            Out-of-range values return **400** `INVALID_PARAMETER`
            (legacy GET range check — distinct from the POST options-path
            which returns 422 `INVALID_OVERRIDE`).
          schema:
            type: number
            format: float
            minimum: 0
            maximum: 0.2
        - name: trace
          in: query
          required: false
          description: |
            Set to `1` to capture a server-side per-request artifact bundle for
            debugging. Does not change the response body. Equivalent to sending
            the `X-Midas-Trace: 1` header.
          schema:
            type: string
            enum: ["1"]
      responses:
        '200':
          description: Fair value metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FairValueResponse'
        '400':
          description: Invalid ticker or request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions for this endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Ticker not present in SEC's ticker→CIK index (genuinely unknown symbol)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Ticker resolves but cannot be valued. The `code` field in the
            response body distinguishes between the cases:

            * `INSUFFICIENT_DATA` — SEC has no usable US-GAAP XBRL facts
              (clinical-stage biotechs, pre-revenue issuers).
            * `FOREIGN_PRIVATE_ISSUER_UNSUPPORTED` — SEC filing uses
              ifrs-full taxonomy from a Form 20-F (TSM, ASML, NVO, AZN, SAP,
              BABA, …); the data exists but Midas cannot yet parse IFRS.
              The `context` field carries `taxonomy` and `filing_type`.
            * `MODEL_NOT_APPLICABLE` — no industry-aware model produced a
              result (e.g., negative operating income with no fallback).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded (see Retry-After header)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal calculation error (CALCULATION_ERROR) or recovered panic (INTERNAL)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Calculate fair value with optional per-request overrides
      description: |
        Accepts an optional JSON body with an `options` block of per-request
        valuation knob overrides. An empty body or `{}` produces a response
        byte-identical to `GET /api/v1/fair-value/{ticker}` for the same ticker.

        **Validation asymmetry (important for clients):**
        The legacy GET query parameters (`override_beta`, `override_rf`) use
        simple range checks that return **400** on invalid input. The POST
        `options` block uses Layer-1 static range + enum validation followed by
        Layer-2 cross-knob invariant checks (terminal_growth < WACC, min ≤ max,
        stage-sum ≥ 1, etc.) — all of which return **422** `INVALID_OVERRIDE`.

        The `applied_overrides` field in the response echoes only the knobs
        that were explicitly set in the request (request-sourced knobs, not
        profile-or-config-sourced ones). Absent when no overrides were supplied.
      tags: [valuation]
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 5
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SingleFairValueRequest'
      responses:
        '200':
          description: Fair value metrics (with applied_overrides when overrides were supplied)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FairValueResponse'
        '400':
          description: Invalid ticker or malformed request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions for this endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Ticker not present in SEC's ticker→CIK index
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Override validation failed or ticker cannot be valued. The `code`
            field distinguishes the cases:

            * `INVALID_OVERRIDE` — a knob value failed Layer-1 static range /
              enum validation (e.g. `market_risk_premium` < 0), or a Layer-2
              cross-knob invariant was violated (e.g. `terminal_growth_rate` >=
              WACC, `min_growth_rate` > `max_growth_rate`, `horizon_years` <
              stage-sum, `exit_multiple` requested but no multiple resolvable).
              The `context.knob` field names the offending parameter.
            * `INSUFFICIENT_DATA` — SEC has no usable XBRL facts.
            * `FOREIGN_PRIVATE_ISSUER_UNSUPPORTED` — 20-F filer.
            * `MODEL_NOT_APPLICABLE` — no model produced a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded (see Retry-After header)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal calculation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/fair-value/bulk:
    post:
      summary: Get fair value for multiple tickers
      tags: [valuation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkFairValueRequest'
      responses:
        '200':
          description: Bulk fair value results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkFairValueResponse'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '207':
          description: |
            Multi-Status — some tickers succeeded and some failed. Body is a
            BulkFairValueResponse; inspect `results[]` and `failures[]`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkFairValueResponse'
        '401':
          description: Authentication required or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions for this endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            All requested tickers failed. Body is still a BulkFairValueResponse
            with an empty `results[]` and a populated `failures[]`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkFairValueResponse'
        '429':
          description: Rate limit exceeded (see Retry-After header)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/health/detailed:
    get:
      summary: Detailed health check
      tags: [health]
      responses:
        '200': { description: Healthy }
        '206': { description: Degraded }
        '503': { description: Unhealthy }
        '401': { description: Authentication required }
  /api/v1/metrics:
    get:
      summary: Application and business metrics
      tags: [metrics]
      responses:
        '200': { description: Metrics JSON }
        '401': { description: Authentication required }
  /api/v1/auth/keys:
    post:
      summary: Create API key (admin)
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, permissions]
              properties:
                user_id:
                  type: string
                permissions:
                  type: array
                  items:
                    type: string
      responses:
        '201': { description: Created }
        '400': { description: Invalid request }
        '401': { description: Authentication required }
        '403': { description: Insufficient permissions }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Industry:
      type: object
      description: |
        Dual industry classification — both the SIC-derived label (used
        internally to select the valuation model) and the balance-sheet
        heuristic label (used by the datacleaner). The `match` flag is true
        when the two classifiers agree per the canonical SIC -> GICS mapping,
        and false otherwise. A false match signals potential classifier drift
        worth investigating; see
        docs/superpowers/specs/2026-04-23-industry-in-response-design.md.
      properties:
        sic_code:
          type: string
          description: Raw SIC code from SEC (omitted if unavailable)
          example: "3674"
        sic:
          type: string
          description: |
            SIC-derived industry label. Top-level codes: TECH, MFG, RETAIL,
            UTIL, FIN, HEALTH, ENERGY, RESTATE, TELECOM, TRANS, CONS. Plus
            sub-industry refinements (TECH_SAAS, MFG_SEMI, FIN_BANK,
            HEALTH_BIOTECH, …) and REIT subsectors (REIT_RESIDENTIAL,
            REIT_DATACENTER, …).
          example: "MFG"
        heuristic_code:
          type: string
          description: GICS sector code from the balance-sheet heuristic classifier
          example: "45"
        heuristic_name:
          type: string
          description: Human-readable GICS sector name
          example: "Information Technology"
        match:
          type: boolean
          description: True when SIC and heuristic agree per the canonical mapping
          example: true
    FairValueResponse:
      type: object
      properties:
        ticker:
          type: string
        wacc:
          type: number
          format: float
        growth_rate:
          type: number
          format: float
        tangible_value_per_share:
          type: number
          format: float
        dcf_value_per_share:
          type: number
          format: float
        growth_rates:
          type: array
          items:
            type: number
            format: float
          description: |
            Per-year growth rates for the explicit projection period. Length
            equals dcf_horizon_years (archetype-driven: 3/5/7/10). Stage 1 =
            high-growth rate from the analyst/historical blend; Stage 2 =
            linear fade toward the terminal rate.
          example: [0.05, 0.048, 0.046, 0.044, 0.042, 0.038, 0.034]
        dcf_horizon_years:
          type: integer
          example: 5
          description: |
            Number of explicit DCF projection years the engine used before
            handing off to the terminal-value calculation. Resolved from the
            ticker's archetype profile (VAL-1 Phase 2 — Tier 2 P2): mature
            large-cap = 3, standard growth = 5, high-growth profitable = 7,
            hyper-growth = 10. Always equals `len(dcf_per_year_pv)`. Omitted
            when zero (non-DCF model fired — e.g. DDM / FFO / Revenue
            Multiple), since those models do not project explicit yearly cash
            flows.
        dcf_terminal_method:
          type: string
          enum: [gordon_growth, exit_multiple]
          example: "gordon_growth"
          description: |
            How the engine computed the terminal value. `gordon_growth` =
            Gordon perpetual-growth formula on year-N FCF with the clamped
            terminal growth rate (the only method today). `exit_multiple` =
            year-N revenue × mature-sector EV/Revenue multiple, reserved for
            future archetype profiles where Gordon stability is implausible
            at the explicit-horizon boundary (VAL-1 Phase 4). Omitted on
            non-DCF model paths.
        dcf_terminal_pct_of_ev:
          type: number
          format: float
          example: 0.62
          description: |
            Ratio of discounted terminal value to total enterprise value
            (`terminal_pv / enterprise_value`). Damodaran's healthy band is
            roughly 0.60-0.80; values above 0.80 indicate the model is
            implicitly "betting on the terminal year" rather than the
            explicit forecast. When this exceeds 0.80 the engine appends a
            `terminal_dominance` warning to `warnings` so operators can flag
            for review. Omitted when zero (non-DCF model or degenerate
            enterprise_value).
        dcf_per_year_pv:
          type: array
          items:
            type: number
            format: float
          example: [12.4, 11.8, 11.1, 10.3, 9.5]
          description: |
            Present value of each explicit projection year's free cash flow,
            in the same currency and per-share basis as `dcf_value_per_share`.
            Length always equals `dcf_horizon_years`. Chart-friendly — a
            consumer can render the explicit-period waterfall directly from
            this array and overlay it against `dcf_terminal_pct_of_ev` to
            visualize the explicit-vs-terminal composition of the valuation.
            Omitted on non-DCF model paths.
        dcf_terminal_growth_used:
          type: number
          format: float
          example: 0.025
          description: |
            The terminal growth rate that actually fed into the Gordon
            formula after the WACC-spread guardrail clamped it. The engine
            requires `terminal_growth <= WACC - 2%` to keep the Gordon
            denominator stable; when the requested terminal rate (typically
            3% default or profile-driven) would violate that spread, this
            field reports the clamped value so consumers can detect when
            their WACC was tight enough to suppress the input. Omitted on
            non-DCF model paths.
        growth_source:
          type: string
          enum: [analyst_blend, historical_only, default]
          description: How growth was estimated.
        growth_confidence:
          type: string
          enum: [high, medium, low]
          description: Confidence in the estimated growth rate.
        calculation_method:
          type: string
          enum: [multi_stage_dcf, ddm, ffo, revenue_multiple]
          description: |
            Which valuation model fired. Industry-aware router: REITs route to
            `ffo`, banks to `ddm`, negative-OI tickers to `revenue_multiple`,
            everything else to `multi_stage_dcf`.
        calculation_version:
          type: string
          example: "4.4"
          description: |
            Calculation engine version. Bumped on shape-changing or breaking-numeric
            changes (e.g., 4.1 added Graham-floor diagnostic fields and flipped the
            tangible_value_per_share denominator to diluted shares; 4.4 is the
            current DC-1 parallel-views engine).
        warnings:
          type: array
          items:
            type: string
          description: |
            Diagnostic warnings — sanity-check flags, revenue-base source path
            (e.g. "revenue_base: source=ANNUAL_FY revenue=$467641000"), sector-multiple
            applied notice (e.g. "Applied 6.5x EV/Revenue multiple for MFG_SEMI sector"),
            NAV-divergence (FFO model), Graham-floor unresolved, etc.
        sanity_check:
          $ref: '#/components/schemas/SanityCheck'
        current_assets_per_share:
          type: number
          format: float
          nullable: true
          example: 55.13
          description: |
            Current assets divided by diluted shares. Pure asset-side floor
            with no liability subtraction. Returned as null (omitted from
            JSON) when total_liabilities cannot be resolved (a warning is
            added to `warnings`).
        ncav_per_share:
          type: number
          format: float
          nullable: true
          example: 4.55
          description: |
            Net Current Asset Value per share — Graham's classic deep-value
            metric: (current_assets - total_liabilities) / diluted_shares.
            May be negative when liabilities exceed current assets (the raw
            value is returned, no clamping). Returned as null (omitted)
            when total_liabilities cannot be resolved.
        graham_floor_per_share:
          type: number
          format: float
          nullable: true
          example: 3.03
          description: |
            "Buy below" trigger per Graham — max(ncav_per_share * 2/3, 0).
            **The value 0 stays in the JSON** when present — clamped from a
            negative NCAV — and represents "no asset floor exists, the
            company has more obligations than liquid assets". Returned as
            null (omitted) only when total_liabilities cannot be resolved
            (distinct signal: data unavailable vs. data says zero).
        graham_discount_pct:
          type: number
          format: float
          nullable: true
          example: 23.30
          description: |
            Ratio (current_price - graham_floor_per_share) / graham_floor_per_share.
            Positive = price above the floor (normal market pricing or
            overvalued vs. floor); negative = price below the floor (Graham
            net-net territory). Returned as null (omitted from JSON) when
            graham_floor_per_share is 0 (divide-by-zero would otherwise
            produce a meaningless infinity signal) or when current_price
            is unavailable.
        as_of:
          type: string
          format: date-time
        data_quality_score:
          type: number
          format: float
        data_quality_grade:
          type: string
        industry:
          $ref: '#/components/schemas/Industry'
        currency:
          type: string
          example: "USD"
          description: |
            ISO-4217 code that dcf_value_per_share and tangible_value_per_share
            are denominated in. Always "USD" — the valuation engine FX-converts
            every period's reporting-currency monetary fields to USD via Phase B9
            of the IFRS-FPI plan before any math runs. Surfaced for transparency
            so API consumers do not re-convert.
        adr_ratio_applied:
          type: integer
          example: 5
          description: |
            Ordinary-shares-per-ADR multiplier the engine divided SEC-reported
            share counts by before computing per-share values. 1 for domestic
            10-K filers and unknown tickers; non-1 for configured ADRs (TSM=5,
            BABA=8, ...). Phase B10 of the IFRS-FPI plan. Omitted when zero.
        current_price:
          type: number
          format: float
          example: 190.25
          description: |
            Live per-share market price captured from the market-data gateway
            (Yahoo Finance / Finzive) at the moment the valuation was computed.
            Same denomination and per-share basis as dcf_value_per_share and
            tangible_value_per_share — for ADRs this is the per-ADR exchange
            price, directly comparable to the per-ADR DCF value the engine
            produces after applyADRRatio. Surfaced so consumers can compute
            the upside/downside discount ((dcf - price) / price) without a
            second quote lookup. Omitted when zero (delisted or unavailable).
        assumption_profile:
          type: string
          example: "mature_large_bank:mature"
          description: |
            Resolved assumption-profile ID in `archetype:maturity` form.
            Identifies the calibration record (DCF horizon, terminal method,
            discount method, growth caps) the engine applied to this company.
            Omitted when no profile registry is wired (legacy/test paths).
        resolution_trace:
          $ref: '#/components/schemas/ResolutionTrace'
        applied_overrides:
          type: object
          description: |
            Echoes the valuation knobs that were explicitly set by the request,
            each with the resolved value and source `"request"`. Absent
            (omitempty) when no overrides were supplied — default GET responses
            and `POST {}` requests are byte-identical. Only request-sourced
            knobs appear here in v1; profile-sourced or config-sourced knobs
            are NOT echoed.

            Keys are knob names (e.g. `"tax_rate"`, `"horizon_years"`);
            values are `AppliedOverride` objects.
          additionalProperties:
            $ref: '#/components/schemas/AppliedOverride'
    BulkFairValueRequest:
      type: object
      required: [tickers]
      properties:
        tickers:
          type: array
          minItems: 1
          maxItems: 10
          items:
            type: string
        override_beta:
          type: number
          format: float
          description: |
            Legacy beta override applied to all tickers. Mutually exclusive with
            `options.beta` — supplying both returns 422 `INVALID_OVERRIDE`.
        override_rf:
          type: number
          format: float
          description: |
            Legacy risk-free rate override applied to all tickers. Mutually
            exclusive with `options.risk_free_rate` — supplying both returns
            422 `INVALID_OVERRIDE`.
        options:
          $ref: '#/components/schemas/ValuationOverrides'
          description: |
            Structured per-request valuation knob overrides applied to all
            tickers in the batch. When set, must not duplicate any knob that
            is also set via the legacy `override_beta` / `override_rf` fields.
    BulkSummary:
      type: object
      properties:
        total_requested:
          type: integer
        successful:
          type: integer
        failed:
          type: integer
    BulkFailure:
      type: object
      description: |
        Compact per-ticker failure record for the bulk endpoint. NOT a full
        RFC 7807 Problem-Details object — those are returned only for
        whole-request errors (e.g. a malformed body).
      properties:
        ticker:
          type: string
          example: "XYZA1"
        error_code:
          type: string
          enum: [INVALID_TICKER, INVALID_OVERRIDE, TICKER_NOT_FOUND, INSUFFICIENT_DATA, MODEL_NOT_APPLICABLE, FOREIGN_PRIVATE_ISSUER_UNSUPPORTED, CALCULATION_ERROR]
          example: "TICKER_NOT_FOUND"
        message:
          type: string
          example: "Ticker not found in any data source"
        knob:
          type: string
          description: |
            Name of the override parameter that caused an `INVALID_OVERRIDE`
            error. Empty and omitted for all other error codes. Mirrors the
            `context.knob` field in the single-ticker 422 error response, so
            programmatic consumers can identify the offending knob without
            string-parsing the `message`.
          example: "market_risk_premium"
    BulkFairValueResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/FairValueResponse'
        failures:
          type: array
          description: |
            Per-ticker failures, in the order encountered. Omitted when every
            ticker succeeds (HTTP 200). Iterate separately from `results[]`
            and match by `ticker`.
          items:
            $ref: '#/components/schemas/BulkFailure'
        summary:
          $ref: '#/components/schemas/BulkSummary'
    ErrorResponse:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        context:
          type: object
          additionalProperties: true
    SanityCheck:
      type: object
      description: |
        Cross-validation against sector median multiples. Advisory only —
        flags are emitted to `warnings[]` but do not invalidate the valuation.
        Populated only when the multi_stage_dcf path fires AND
        config/industry_multiples.json has matching sector entries.
      properties:
        implied_pe:
          type: number
          format: float
          nullable: true
          description: DCF Value / EPS
        implied_ev_ebitda:
          type: number
          format: float
          nullable: true
          description: Enterprise Value / EBITDA
        implied_pfcf:
          type: number
          format: float
          nullable: true
          description: DCF Value / FCF per Share
        sector_median_pe:
          type: number
          format: float
        sector_median_ev_ebitda:
          type: number
          format: float
        sector_median_pfcf:
          type: number
          format: float
        is_reasonable:
          type: boolean
          description: |
            true when ALL implied multiples fall within [0.5x, 2.0x] of their
            sector median; false when any one breaches.
        flags:
          type: array
          items:
            type: string
          description: |
            Per-metric flag strings for any breach, e.g.
            "DCF-implied P/E (9.3) is <0.5x sector median (28.0) for TECH".
    ResolutionTrace:
      type: object
      description: |
        Structured audit trail of how the assumption profile was selected.
        Lets consumers explain an unexpected horizon/method and supports
        replay determinism. Omitted (with assumption_profile) on legacy
        mature-large-bank DDM and test paths where no profile registry is
        wired.
      properties:
        profile_id:
          type: string
          example: "mature_large_bank:mature"
          description: Same value as the top-level assumption_profile.
        source:
          type: string
          enum: [explicit, inferred, fallback]
          description: |
            How the profile was selected. `explicit` = a non-wildcard industry
            rule matched and had a profile entry. `inferred` = partial match
            (reserved for future use). `fallback` = no rule matched / no entry;
            the conservative default profile was applied.
        resolver_version:
          type: string
          description: Version of the resolution algorithm that ran.
        config_version:
          type: string
          description: Version of config/assumption_profiles.json in effect.
        config_hash:
          type: string
          description: SHA-256 of the profile config, for replay reproducibility. Omitted when unset.
        matched_rule_id:
          type: string
          description: ID of the archetype rule that matched. Omitted on fallback.
        fallback_reason:
          type: string
          description: Why the fallback fired. Present only when source = fallback.
        missing_facts:
          type: array
          items:
            type: string
          description: Facts unavailable during resolution (drove inference/fallback). Omitted when none.
        human_reason:
          type: string
          description: Human-readable one-line summary of the resolution decision.
    SingleFairValueRequest:
      type: object
      description: |
        POST body for `POST /api/v1/fair-value/{ticker}`. An empty or absent
        `options` block produces a response byte-identical to the GET endpoint.
      properties:
        options:
          $ref: '#/components/schemas/ValuationOverrides'
    ValuationOverrides:
      type: object
      description: |
        Per-request valuation knob overrides. All fields are optional; omitted
        means "use the resolved default". Validated in two layers:
        - **Layer 1 (static):** Per-knob range and enum checks. Violations
          return 422 `INVALID_OVERRIDE` immediately.
        - **Layer 2 (cross-knob):** Checked by the params resolver after static
          validation passes. Examples: `terminal_growth_rate >= WACC`,
          `min_growth_rate > max_growth_rate`, `horizon_years < stage-sum`,
          `terminal_method = exit_multiple` but no multiple resolvable.
          Violations return 422 `INVALID_OVERRIDE` with the offending knob in
          `context.knob`.

        **Knob resolution order (single, authoritative path):**
        config defaults → assumption profile → request override (`params.Resolve*`).
        The `applied_overrides` response field echoes only the request-layer knobs.
      properties:
        terminal_growth_rate:
          type: number
          format: float
          example: -0.01
          description: |
            Explicit absolute terminal growth rate (g) for the Gordon Growth
            formula. Negative values allowed (real-terms decline scenario).
            When omitted the engine auto-derives g from historical CAGR,
            capped by `terminal_growth_cap`. Layer-2 invariant: must be <
            WACC − 2% (Gordon stability spread).
        terminal_growth_cap:
          type: number
          format: float
          example: 0.03
          description: |
            Cap applied during auto-derivation of the terminal growth rate.
            Default: 0.03 (3%). No effect when `terminal_growth_rate` is set.
        horizon_years:
          type: integer
          example: 5
          description: |
            DCF forecast horizon in years. When omitted the engine uses the
            archetype profile's horizon (typically 3, 5, 7, or 10).
            Layer-2 invariant: must be ≥ sum of growth-stage years when
            growth stages are also overridden.
        growth_stages:
          $ref: '#/components/schemas/GrowthStages'
        max_growth_rate:
          type: number
          format: float
          example: 0.5
          description: |
            Upper clamp applied inside the growth estimator. Default: 0.5 (50%).
            Layer-2 invariant: must be ≥ `min_growth_rate`.
        min_growth_rate:
          type: number
          format: float
          example: -0.3
          description: |
            Lower clamp applied inside the growth estimator. Default: −0.3
            (−30%). Negative values represent contraction scenarios.
            Layer-2 invariant: must be ≤ `max_growth_rate`.
        terminal_method:
          type: string
          enum: [gordon_growth, exit_multiple]
          example: exit_multiple
          description: |
            Terminal-value calculation model. `gordon_growth` = Gordon
            perpetual-growth formula (default). `exit_multiple` = year-N
            EBITDA × exit multiple (requires `terminal_multiple` or an
            industry default to be resolvable; Layer-2 error if neither
            is available).

            **Profile-sourced `exit_multiple`**: a profile may set this as
            its default terminal method (e.g. high-growth tech). However, the
            default-path DCF averaging still uses the industry lookup for the
            multiple unless a request override explicitly sets
            `terminal_multiple`. Only a REQUEST override drives the exit
            multiple into the averaging path.
        terminal_multiple:
          type: number
          format: float
          example: 14.0
          description: |
            EV/EBITDA (or analogous) exit multiple used when
            `terminal_method = exit_multiple`. When omitted the engine falls
            back to the industry default from `config/industry_multiples.json`.
        tax_rate:
          type: number
          format: float
          example: 0.21
          description: |
            Effective corporate tax rate applied to FCF, WACC, and the
            alt-model ModelInput. Negative values allowed (NOL / tax-credit
            scenarios). Layer-1 range: no lower bound enforced; no upper bound.
        beta:
          type: number
          format: float
          example: 1.2
          description: |
            Equity beta for the CAPM cost-of-equity calculation. Negative
            values allowed (inverse-correlated assets). Conflicts with the
            legacy `override_beta` field on the bulk request body — supplying
            both returns 422 `INVALID_OVERRIDE`.
        risk_free_rate:
          type: number
          format: float
          example: 0.045
          description: |
            Nominal risk-free rate (e.g. 10-year Treasury yield). Negative
            values allowed (EUR/JPY/CHF negative-rate regimes). Conflicts with
            the legacy `override_rf` bulk field and the `override_rf` GET query
            parameter — supplying both returns 422 `INVALID_OVERRIDE`.
        market_risk_premium:
          type: number
          format: float
          example: 0.05
          description: |
            Equity risk premium (ERP) added to the risk-free rate in CAPM.
            Layer-1 constraint: must be ≥ 0 (negative ERP is economically
            unsound and is rejected with 422 `INVALID_OVERRIDE`).
    GrowthStages:
      type: object
      description: |
        Three-stage growth-estimator duration overrides (all optional). Stage
        durations are in years. When any sub-field is set a per-request
        estimator is built instead of reusing the shared service-level one.
      properties:
        stage1_years:
          type: integer
          example: 3
          description: High-growth phase duration (default 3).
        stage2_years:
          type: integer
          example: 4
          description: Fade / transition phase duration (default 4).
        stage3_years:
          type: integer
          example: 0
          description: Long-tail extension duration (default 0 — legacy 7-year horizon).
    AppliedOverride:
      type: object
      description: |
        Per-knob payload within the `applied_overrides` response map. Source
        is always `"request"` in v1 — only request-sourced knobs appear here.
      required: [value, source]
      properties:
        value:
          description: |
            Resolved scalar the engine used. Type matches the knob: float64
            for rate/multiplier/multiple fields, integer for year fields,
            string for method fields.
        source:
          type: string
          example: request
          description: |
            Precedence layer that supplied the value. Always `"request"` in v1.

