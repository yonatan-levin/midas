openapi: 3.0.3
info:
  title: Midas DCF Valuation API
  version: 0.1.0
  description: |
    REST API exposing intrinsic value metrics per ticker.
    - Net Tangible Asset Value per share
    - DCF Fair Value per share (5-year projection, WACC-discounted)
servers:
  - url: http://localhost:8080
    description: Local development
security:
  - ApiKeyAuth: []
paths:
  /health:
    get:
      summary: Basic liveness probe
      tags: [health]
      security: []
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  timestamp: { type: string, format: date-time }
                  service: { type: string, example: dcf-valuation-api }
  /ready:
    get:
      summary: Readiness probe
      tags: [health]
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ready }
                  timestamp: { type: string, format: date-time }
                  checks:
                    type: object
                    properties:
                      database: { type: string }
                      external_apis: { type: string }
                      cache: { type: string }
  /version:
    get:
      summary: Application version info
      tags: [health]
      security: []
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string, example: '0.9.0-rc1' }
                  environment: { type: string, example: development }
                  build_time: { type: string }
                  git_commit: { type: string }
  /api/v1/fair-value/{ticker}:
    get:
      summary: Get fair value for a ticker
      tags: [valuation]
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 5
        - name: override_beta
          in: query
          required: false
          schema:
            type: number
            format: float
        - name: override_rf
          in: query
          required: false
          schema:
            type: number
            format: float
      responses:
        '200':
          description: Fair value metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FairValueResponse'
        '400':
          description: Invalid ticker or request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Ticker not present in SEC's ticker→CIK index (genuinely unknown symbol)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: |
            Ticker resolves but cannot be valued. The `code` field in the
            response body distinguishes between the cases:

            * `INSUFFICIENT_DATA` — SEC has no usable US-GAAP XBRL facts
              (clinical-stage biotechs, pre-revenue issuers).
            * `FOREIGN_PRIVATE_ISSUER_UNSUPPORTED` — SEC filing uses
              ifrs-full taxonomy from a Form 20-F (TSM, ASML, NVO, AZN, SAP,
              BABA, …); the data exists but Midas cannot yet parse IFRS.
              The `context` field carries `taxonomy` and `filing_type`.
            * `MODEL_NOT_APPLICABLE` — no industry-aware model produced a
              result (e.g., negative operating income with no fallback).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/fair-value/bulk:
    post:
      summary: Get fair value for multiple tickers
      tags: [valuation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkFairValueRequest'
      responses:
        '200':
          description: Bulk fair value results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkFairValueResponse'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/health/detailed:
    get:
      summary: Detailed health check
      tags: [health]
      responses:
        '200': { description: Healthy }
        '206': { description: Degraded }
        '503': { description: Unhealthy }
        '401': { description: Authentication required }
  /api/v1/metrics:
    get:
      summary: Application and business metrics
      tags: [metrics]
      responses:
        '200': { description: Metrics JSON }
        '401': { description: Authentication required }
  /api/v1/auth/keys:
    post:
      summary: Create API key (admin)
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, permissions]
              properties:
                user_id:
                  type: string
                permissions:
                  type: array
                  items:
                    type: string
      responses:
        '201': { description: Created }
        '400': { description: Invalid request }
        '401': { description: Authentication required }
        '403': { description: Insufficient permissions }
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    Industry:
      type: object
      description: |
        Dual industry classification — both the SIC-derived label (used
        internally to select the valuation model) and the balance-sheet
        heuristic label (used by the datacleaner). The `match` flag is true
        when the two classifiers agree per the canonical SIC -> GICS mapping,
        and false otherwise. A false match signals potential classifier drift
        worth investigating; see
        docs/superpowers/specs/2026-04-23-industry-in-response-design.md.
      properties:
        sic_code:
          type: string
          description: Raw SIC code from SEC (omitted if unavailable)
          example: "3674"
        sic:
          type: string
          description: SIC-derived industry label (TECH, MFG, RETAIL, UTIL, FINL, HEALTH, NA)
          example: "MFG"
        heuristic_code:
          type: string
          description: GICS sector code from the balance-sheet heuristic classifier
          example: "45"
        heuristic_name:
          type: string
          description: Human-readable GICS sector name
          example: "Information Technology"
        match:
          type: boolean
          description: True when SIC and heuristic agree per the canonical mapping
          example: true
    FairValueResponse:
      type: object
      properties:
        ticker:
          type: string
        wacc:
          type: number
          format: float
        growth_rate:
          type: number
          format: float
        tangible_value_per_share:
          type: number
          format: float
        dcf_value_per_share:
          type: number
          format: float
        as_of:
          type: string
          format: date-time
        data_quality_score:
          type: number
          format: float
        data_quality_grade:
          type: string
        industry:
          $ref: '#/components/schemas/Industry'
        currency:
          type: string
          example: "USD"
          description: |
            ISO-4217 code that dcf_value_per_share and tangible_value_per_share
            are denominated in. Always "USD" — the valuation engine FX-converts
            every period's reporting-currency monetary fields to USD via Phase B9
            of the IFRS-FPI plan before any math runs. Surfaced for transparency
            so API consumers do not re-convert.
        adr_ratio_applied:
          type: integer
          example: 5
          description: |
            Ordinary-shares-per-ADR multiplier the engine divided SEC-reported
            share counts by before computing per-share values. 1 for domestic
            10-K filers and unknown tickers; non-1 for configured ADRs (TSM=5,
            BABA=8, ...). Phase B10 of the IFRS-FPI plan. Omitted when zero.
    BulkFairValueRequest:
      type: object
      required: [tickers]
      properties:
        tickers:
          type: array
          minItems: 1
          maxItems: 10
          items:
            type: string
        override_beta:
          type: number
          format: float
        override_rf:
          type: number
          format: float
    BulkSummary:
      type: object
      properties:
        total_requested:
          type: integer
        successful:
          type: integer
        failed:
          type: integer
    BulkFairValueResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/FairValueResponse'
        summary:
          $ref: '#/components/schemas/BulkSummary'
    ErrorResponse:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        context:
          type: object
          additionalProperties: true


