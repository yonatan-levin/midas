name: Contract Fuzzing

on:
  # Schemathesis `--checks all` fuzzing surfaces real spec-vs-implementation
  # gaps (response-schema conformance, 405-for-unsupported-methods, an input
  # -validation 500 on POST /api/v1/auth/keys) that are a separate API-hardening
  # backlog, tracked in docs/reviewer/CI-1.1-schemathesis-contract-findings.md.
  # Until that backlog is burned down this suite cannot be green on push, so it
  # is GATED off the default push/PR path (CI-1 / #20) — it runs manually,
  # nightly, or on a pull request explicitly labeled `contract`.
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'
  pull_request:
    types: [labeled, opened, synchronize, reopened]

jobs:
  schemathesis:
    # Only run for manual dispatch, the nightly schedule, or a PR carrying the
    # `contract` label — never on every PR event (the findings above would make
    # every clean PR red until they are fixed).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'contract'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Schemathesis
        run: pip install --upgrade pip schemathesis

      - name: Prepare database (schema + migrations)
        run: |
          go run ./cmd/migrate -db ./data/midas_ci.db

      - name: Start server
        run: |
          # Env keys MUST match internal/config/config.go (viper maps
          # database.driver -> DATABASE_DRIVER, database.sqlite_path ->
          # DATABASE_SQLITE_PATH). The previous DATABASE_TYPE/DATABASE_PATH keys
          # were silently ignored, so the server booted without the migrated DB
          # and failed the health check before schemathesis ever ran (CI-1 / #20).
          export ENABLE_SWAGGER=true
          export DATABASE_DRIVER=sqlite3
          export DATABASE_SQLITE_PATH=./data/midas_ci.db
          nohup bash -c 'go run ./cmd/server' >/tmp/server.log 2>&1 &

      - name: Wait for health
        run: |
          for i in {1..30}; do curl -sf http://localhost:8080/health && exit 0; sleep 1; done; echo 'Server not healthy' >&2; cat /tmp/server.log; exit 1

      - name: Run Schemathesis (with demo key)
        env:
          DEMO_KEY: dcf_demo_3a4a5b6c7d8e9f00112233445566778899aabbccddeeff001122334455667788
        run: |
          python -m schemathesis.cli run http://localhost:8080/docs/openapi.yaml --header "X-API-Key: $DEMO_KEY" --checks all


