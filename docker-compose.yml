# DCF Valuation API - Development Environment
# docker-compose up --build to start all services

version: '3.8'

services:
  # Main API service
  dcf-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dcf-valuation-api
    ports:
      - "8080:8080"
    environment:
      # Env-var names match config struct mapstructure tags — see .env.example
      # and docs/API_DOCUMENTATION.md §8 for the full canonical surface.

      # Application
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - PORT=8080
      - GIN_MODE=debug                                 # Gin framework (not Viper)
      - ENABLE_SWAGGER=true
      - ENABLE_PPROF=true

      # Database
      - DATABASE_DRIVER=sqlite3
      - DATABASE_SQLITE_PATH=/app/data/midas.db
      - DATABASE_MAX_OPEN_CONN=25
      - DATABASE_MAX_IDLE_CONN=5
      - RUN_MIGRATIONS=true                            # docker-entrypoint.sh hook

      # Cache (Redis)
      - CACHE_REDIS_URL=redis://redis:6379

      # SEC EDGAR — uses default base_url; override SEC_USER_AGENT with real contact
      - SEC_USER_AGENT=Midas DCF API development@example.com
      - SEC_RATE_LIMIT=10

      # Macro data (FRED disabled in dev; uses manual rates)
      - MACRO_FRED_ENABLED=false
      - MACRO_MANUAL_RISK_FREE_RATE=0.045
      - MACRO_MANUAL_MARKET_RISK_PREMIUM=0.05

      # Data Cleaner
      - DATACLEANER_ENABLED=true
      - DATACLEANER_RULES_PATH=/app/config/datacleaner/rules.json
      - DATACLEANER_INDUSTRY_RULES_PATH=/app/config/datacleaner/industry
      - DATACLEANER_MIN_QUALITY_SCORE=50.0
      - DATACLEANER_ENABLE_CACHING=true
      - DATACLEANER_CACHE_TTL=1h
    volumes:
      # Data persistence
      - dcf_data:/app/data
      # Logs are emitted to stdout only — Docker's json-file log driver captures them.
      # Use `docker logs <container>` or ship via a log driver (loki/fluent/etc.).
      # No bind mount for /app/logs (removed in Phase U of the observability upgrade).
      # Configuration (for development - mount local config)
      - ./config:/app/config:ro
      - ./docs:/app/docs:ro
      - ./migrations:/app/migrations:ro
    depends_on:
      - redis
    networks:
      - dcf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Redis cache service
  redis:
    image: redis:7-alpine
    container_name: dcf-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - dcf-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Redis Commander - Web UI for Redis (development only)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: dcf-redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    networks:
      - dcf-network
    restart: unless-stopped
    profiles:
      - debug

# Named volumes for data persistence
volumes:
  dcf_data:
    driver: local
    name: dcf_valuation_data
  redis_data:
    driver: local
    name: dcf_redis_data

# Custom network for service communication
networks:
  dcf-network:
    driver: bridge
    name: dcf-valuation-network 